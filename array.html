<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array JavaScript</title>
</head>
<body>
    <script>
        let arrayKosong = [];
        arrayKosong.push("Sakha");
        arrayKosong.push("Ibadil", "Kirom");

        arrayKosong[0] = "sakuy";

        document.writeln(`<p>${arrayKosong}</p>`);
        console.table(arrayKosong);
        console.info(arrayKosong.length);
        
        console.info(arrayKosong[0]);
        console.info(arrayKosong[1]);
        console.info(arrayKosong[2]);
        
        arrayKosong.push(1,2,3,4,5);
        console.table(arrayKosong);
        
        arrayKosong.push(["Sakha", "Syifa", "Mpus"]);
        console.table(arrayKosong);
    </script>
</body>
</html>
