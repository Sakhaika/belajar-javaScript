<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operasi augmented assigment</title>
</head>
<body>
    <script>
        let bilanganA = 10;

        let bilanganB = bilanganA + 5;

        bilanganB -= 5;
        document.writeln("<p>" + bilanganB + "</p>");

        bilanganB += 10;
        document.writeln("<p>" + bilanganB + "</p>");

        bilanganB **= 2;
        document.writeln("<p>" + bilanganB + "</p>");

        bilanganB %= 2;
        document.writeln("<p>" + bilanganB + "</p>");
    </script>
</body>
</html>
