<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if expression</title>
</head>
<body>
    <script>
        const bilangaPertama = 15;

        if (bilangaPertama > 15){
            document.writeln(true);
            document.writeln(`<p>Kerja bagus nilai kamu ${bilangaPertama} sudah lebih dari 15</p>`);
        } else {
            document.writeln(`<p>Belajar lagi ya dek nilai kamu ${bilangaPertama} masih di bawah dari 15</p>`);
        }
    </script>
</body>
</html>
