<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if expression</title>
</head>
<body>
    <script>
        const bilangaPertama = 90;
        const minimal = 75;

        if (bilangaPertama > minimal){
            document.writeln(true);
            document.writeln(`<p>Kerja bagus nilai kamu ${bilangaPertama} sudah lebih dari ${minimal}</p>`);
        } else if (bilangaPertama == minimal) {
            document.writeln(`<p>Belajar lagi ya dek nilai kamu ${bilangaPertama} masih di bawah dari ${minimal}</p>`);
        } else {
            document.writeln(`<p>Maaf nilai kamu kurang dari ${minimal} iyaitu ${bilangaPertama}</p>`);
        }
    </script>
</body>
</html>
