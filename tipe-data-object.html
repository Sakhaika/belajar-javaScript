<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipe data object</title>
</head>
<body>
    <script>
        const object = {};

        object["Nama"] = "Sakha";
        object["No telp"] = 123456;
        object["alamat"] = "jl indonesia raya";

        console.table(object);
        console.info(`ini isi dari object ${object["No telp"]}`);

        const saya = {
            nama: "Sakha",
            namaTengah: "Ibadil",
            namaBelakang: "Kirom"
        };

        console.table(saya);
        console.info(`nama saya ${saya.nama}`);
    </script>
</body>
</html>
