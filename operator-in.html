<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operator in</title>
  </head>
  <body>
    <script>
      const data = {
        "first name": "Sakha",
        lastname: "Ibadil Kirom",
      };

      let result = "first name" in data;
      document.writeln(`${result}`);
    </script>
