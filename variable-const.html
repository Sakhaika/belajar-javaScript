<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable const</title>
</head>
<body>
    <script>
        const versi = 13;

        versi = 14; // error karena variabel bersifat konstanta hanya dapat menilai 1 kali
        document.writeln("Saya menggunakan versi " + versi);
    </script>
</body>
</html>
