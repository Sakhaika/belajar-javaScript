<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Unary</title>
</head>
<body>
    <script>
        let bilangan1 = 10;

        bilangan1++;
        document.writeln("<p>" + bilangan1 + "</p>");

        bilangan1--;
        document.writeln("<p>" + bilangan1 + "</p>");

        bilangan1 = -bilangan1;
        document.writeln("<p>" + bilangan1 + "</p>");;

        bilangan1 = +bilangan1;
        document.writeln("<p>" + bilangan1 + "</p>");
    </script>
</body>
</html>
