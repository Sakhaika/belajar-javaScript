<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable let</title>
</head>
<body>
    <script>
        let namaLengkap = "Sakha Ibadil Kirom";
        let usia = 19;

        usia = 20;

        document.writeln("Nama saya " + namaLengkap);
        document.writeln("<br>");
        document.writeln("Usia saya " + usia);
    </script>
</body>
</html>
