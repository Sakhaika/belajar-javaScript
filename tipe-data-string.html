<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipe Data String</title>
</head>
<body>
    <script>
        document.writeln("Sakha Ibadil Kirom");
        document.writeln("<br>");
        document.writeln("Politeknik Negeri Jakarta");
        document.writeln("<br>");

        document.writeln("Nama : " + "Sakha Ibadil Kirom");
        document.writeln("<br>");
        document.writeln("Usia : " + 19)
        document.writeln("<br>");

        document.writeln("<textarea> cols='100' rows='10'>");
        document.writeln("Nama \t: " + "Sakha");
        document.writeln("\"Sakha \nIbadil Kiorm\"");
        document.writeln("Usia : " + "\'19\'");
        document.writeln("\\Politeknik Negeri Jakarta\\");
        document.writeln("</textarea>");
    </script>
</body>
</html>
