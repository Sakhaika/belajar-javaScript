<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable</title>
</head>
<body>
    <script>
        var namaLengkap = "Sakha Ibadil Kirom";
        var namaDepan = " Sakha";
        var namaTengah = " Ibadil";
        var namaBelakang = " Kirom";

        document.writeln(namaLengkap + namaDepan + namaTengah + namaBelakang);
        document.writeln("<br>");
        document.writeln(namaDepan);
        document.writeln("<br>");
        document.writeln(namaTengah);
        document.writeln("<br>");
        document.writeln(namaBelakang);
    </script>
</body>
</html>
