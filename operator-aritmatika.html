<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opersi aritmatika</title>
</head>
<body>
    <script>
        let a = 10;

        a = a + 2;
        document.writeln("<p>" + "10 + 2 = " + a + "</p>");
        // let originalResult = a;

        a = a - 1;
        document.writeln("<p>" + a + " - 1 = " + a + "</p>");
        // originalResult = a;

        a = a * 2;
        document.writeln("<p>" + a + " * 2 = " + a + "</p>");
        // originalResult = a;

        let pangkat = a ** 2;
        document.writeln("<p>Hasil dari " + a + " pangkat 2 adalah = " + pangkat + "</p>");

        let modulus = pangkat % 2;
        document.writeln("<p>Hasil modulus dari " + pangkat + " % 2 adalah = " + modulus + "</p>");
    </script>
</body>
</html>
