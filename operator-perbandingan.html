<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Perbandingan</title>
</head>
<body>
    <script>
        let operasiA = 10;
        let operasiB = 5 < operasiA;
        document.writeln(operasiB);
        document.writeln("<br>");

        operasiB = "10" === operasiA;
        document.writeln(operasiB);
        </script>
</body>
</html>
